<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discord Account Support Corporation Transporter</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#5865F2">

    <style>

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111827;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            background: #1f2937;
            padding: 35px;
            border-radius: 18px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 26px;
        }

        p {
            opacity: 0.8;
            line-height: 1.5;
        }

        button {
            margin-top: 25px;
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            background: #5865F2;
            color: white;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

        button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
        }

    </style>

</head>


<body>

<div class="container">

    <h1>🚀 Transporter Ready</h1>

    <p>
        Discord Account Support Corporation<br>
        Outlook Group Portal
    </p>


    <button id="openButton" onclick="openOutlookGroup()">
        📧 Open Outlook Group
    </button>

    <div id="status"></div>

</div>



<script>

const OUTLOOK_GROUP_URL =
"https://outlook.live.com/groups/DiscordAccountSupportCorporation/mail";


function openOutlookGroup() {

    const button = document.getElementById("openButton");
    const status = document.getElementById("status");


    button.disabled = true;

    status.innerHTML =
    "🚀 Transporting to Outlook Group...";


    setTimeout(() => {

        window.location.href = OUTLOOK_GROUP_URL;

    }, 500);

}



// Register PWA Service Worker

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("sw.js")
    .then(() => {

        console.log(
        "Transporter Service Worker Ready"
        );

    })
    .catch(error => {

        console.log(
        "Service Worker Error:",
        error
        );

    });

}

</script>


</body>

</html>
