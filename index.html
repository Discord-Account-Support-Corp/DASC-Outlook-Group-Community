<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discord Account Support Corporation Transporter</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#5865F2">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: #111827;
            color: white;
            text-align: center;
        }

        .box {
            padding: 30px;
        }

        h1 {
            font-size: 28px;
        }

        p {
            opacity: 0.8;
        }
    </style>

<body>

<div class="box">
    <h1>🚀 Transporter Online</h1>
    <p>Connecting to Discord Account Support Corporation Outlook Group...</p>
</div>


<script>

const outlookGroup =
"https://outlook.live.com/groups/groups.outlook.com/DiscordAccountSupportCorporation/mail";


// Redirect immediately
window.location.replace(outlookGroup);


// Register service worker
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
