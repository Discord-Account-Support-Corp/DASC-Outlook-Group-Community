<script>

const OUTLOOK_GROUP_URL =
"https://outlook.live.com/groups/YOUR-REAL-GROUP-URL-HERE";


// Remember your destination

localStorage.setItem(
    "outlookGroup",
    OUTLOOK_GROUP_URL
);


function openOutlookGroup() {

    const savedGroup =
    localStorage.getItem("outlookGroup");


    window.location.replace(
        savedGroup || OUTLOOK_GROUP_URL
    );

}


// Register PWA Service Worker

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("./sw.js")

    .then(() => {

        console.log("Transporter Service Worker Ready");

    })

    .catch(error => {

        console.log("Service Worker Error:", error);

    });

}

</script>
