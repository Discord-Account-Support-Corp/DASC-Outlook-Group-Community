<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discord Account Support Corporation Transporter</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#5865F2">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            text-align: center;
        }

        .box {
            background: #1f2937;
            padding: 40px;
            border-radius: 15px;
            max-width: 400px;
        }

        h1 {
            font-size: 28px;
        }

        button {
            margin-top: 20px;
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #5865F2;
            color: white;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>🚀 Transporter Ready</h1>

    <p>
        Discord Account Support Corporation Outlook Group
    </p>

    <button onclick="openGroup()">
        📧 Open Outlook Group
    </button>

</div>


<script>

function openGroup() {

    window.location.href =
    "https://outlook.live.com/groups/groups.outlook.com/DiscordAccountSupportCorporation/mail";

}


// Register PWA service worker

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("sw.js");

}

</script>


</body>
</html>
