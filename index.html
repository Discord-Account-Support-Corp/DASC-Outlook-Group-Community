<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DASC Outlook Group Transporter</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#5865F2">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DASC Transporter">

</head>


<body>


<p>
🚀 Opening Discord Account Support Corporation Outlook Group...
</p>


<script>

const OUTLOOK_GROUP_URL =
"https://outlook.live.com/groups/groups.outlook.com/DiscordAccountSupportCorporation/mail";


// Small delay gives the PWA time to load correctly

setTimeout(() => {

    window.location.replace(OUTLOOK_GROUP_URL);

}, 100);



if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("./sw.js")

    .then(() => {

        console.log("DASC Transporter Service Worker Ready");

    })

    .catch(error => {

        console.log("Service Worker Error:", error);

    });

}

</script>


</body>

</html>
