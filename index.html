<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Discord Account Support Corporation Transporter</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#5865F2">

    <style>

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111827;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            background: #1f2937;
            padding: 35px;
            border-radius: 18px;
            width: 90%;
            max-width: 420px;
        }

        h1 {
            font-size: 26px;
        }

        p {
            opacity: 0.8;
        }

        button {
            margin-top: 25px;
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            background: #5865F2;
            color: white;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

    </style>

</head>


<body>

<div class="container">

    <h1>🚀 Transporter Ready</h1>

    <p>
        Discord Account Support Corporation<br>
        Outlook Group Portal
    </p>


    <button onclick="openOutlookGroup()">
        📧 Open Outlook Group
    </button>

</div>



<script>

const OUTLOOK_GROUP_URL =
"https://outlook.live.com/groups/groups.outlook.com/DiscordAccountSupportCorporation/mail";


function openOutlookGroup() {

    window.location.href = OUTLOOK_GROUP_URL;

}


// Register PWA Service Worker

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("sw.js")
    .then(() => {
        console.log("Transporter Service Worker Ready");
    })
    .catch(error => {
        console.log("Service Worker Error:", error);
    });

}

</script>


</body>

</html>
